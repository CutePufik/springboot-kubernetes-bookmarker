name: Build

on:
  push:
    branches: ["main"]
    paths:
      - "bookmarker-api/**"
  pull_request:
    branches: ["main"]
    paths:
      - "bookmarker-api/**"

jobs:
  build-bookmarker-api:
    name: Build bookmarker-api
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: ./bookmarker-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Java/Maven toolchain
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          which java
          java -version
          ./mvnw -v

      - name: Build & test (verify)
        run: ./mvnw -ntp verify

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (Spring Boot build-image)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          ./mvnw -ntp spring-boot:build-image \
            -DskipTests \
            -Dspring-boot.build-image.imageName=${{ secrets.DOCKER_USERNAME }}/bookmarker-api:latest \
            -Dspring-boot.build-image.environment.BP_JVM_VERSION=21

      - name: Push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/bookmarker-api:latest
